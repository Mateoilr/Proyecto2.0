<mat-sidenav-container autosize class="layout-container">

  <mat-sidenav #sidenav [mode]="isMobile ? 'over' : 'side'" [opened]="!isMobile" class="sidenav" [class.collapsed]="isCollapsed && !isMobile">
    <div class="logo">
      <mat-icon class="logo-icon">biotech</mat-icon>
      <span class="logo-text">LaboratorioAG</span>
    </div>

    <mat-nav-list>
      <ng-container *ngFor="let item of menuItems">
        <a
          mat-list-item
          *ngIf="shouldShowMenuItem(item)"
          [routerLink]="item.route"
          routerLinkActive="active"
          (click)="isMobile ? sidenav.close() : null"
          [matTooltip]="isCollapsed && !isMobile ? item.label : ''"
          matTooltipPosition="right"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle class="menu-text">{{ item.label }}</span>
        </a>
      </ng-container>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="toolbar">
      <button mat-icon-button (click)="isMobile ? sidenav.toggle() : toggleCollapse()" class="menu-toggle-btn">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="spacer"></span>

      <button mat-icon-button (click)="toggleTheme()" style="margin-right: 16px; color: var(--text-color);">
        <mat-icon>{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      <button mat-button [matMenuTriggerFor]="userMenu" class="user-button">
        <mat-icon>account_circle</mat-icon>
        <span>{{ userName }}</span>
        <mat-icon>arrow_drop_down</mat-icon>
      </button>

      <mat-menu #userMenu="matMenu">
        <div class="user-menu-header">
          <mat-icon>account_circle</mat-icon>
          <div class="user-info">
            <div class="user-name">{{ userName }}</div>
            <div class="user-email">{{ currentUser?.email }}</div>
          </div>
        </div>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Cerrar Sesión</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>

</mat-sidenav-container>
