<div class="patients-container">

  <div class="page-header">
    <div class="header-content">
      <h1><mat-icon>people</mat-icon> Gestión de Pacientes</h1>
      <button mat-raised-button color="primary">
        <mat-icon>person_add</mat-icon>
        Nuevo Paciente
      </button>
    </div>
  </div>

  <mat-card>
    <mat-card-content>

      <!-- BÚSQUEDA -->
      <div class="search-bar">
        <mat-form-field appearance="outline" class="search-field">
          <mat-label>Buscar paciente</mat-label>
          <input matInput placeholder="Nombre, documento...">
          <mat-icon matPrefix>search</mat-icon>
        </mat-form-field>
      </div>

      <!-- TABLA DE PACIENTES -->
      <div class="table-container">
        <table mat-table [dataSource]="patients" class="patients-table">

          <!-- Documento -->
          <ng-container matColumnDef="documento">
            <th mat-header-cell *matHeaderCellDef>Documento</th>
            <td mat-cell *matCellDef="let patient">{{ patient.documento }}</td>
          </ng-container>

          <!-- Nombre -->
          <ng-container matColumnDef="nombre">
            <th mat-header-cell *matHeaderCellDef>Nombre Completo</th>
            <td mat-cell *matCellDef="let patient">
              <strong>{{ patient.nombre }}</strong>
            </td>
          </ng-container>

          <!-- Edad -->
          <ng-container matColumnDef="edad">
            <th mat-header-cell *matHeaderCellDef>Edad</th>
            <td mat-cell *matCellDef="let patient">{{ patient.edad }} años</td>
          </ng-container>

          <!-- Sexo -->
          <ng-container matColumnDef="sexo">
            <th mat-header-cell *matHeaderCellDef>Sexo</th>
            <td mat-cell *matCellDef="let patient">
              <mat-chip>{{ patient.sexo }}</mat-chip>
            </td>
          </ng-container>

          <!-- Contacto -->
          <ng-container matColumnDef="contacto">
            <th mat-header-cell *matHeaderCellDef>Contacto</th>
            <td mat-cell *matCellDef="let patient">{{ patient.contacto }}</td>
          </ng-container>

          <!-- Acciones -->
          <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef>Acciones</th>
            <td mat-cell *matCellDef="let patient">
              <button mat-icon-button color="primary" (click)="viewPatient(patient)" matTooltip="Ver detalles">
                <mat-icon>visibility</mat-icon>
              </button>
              <button mat-icon-button (click)="editPatient(patient)" matTooltip="Editar">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="accent" (click)="createOrder(patient)" matTooltip="Nueva orden">
                <mat-icon>add_box</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </div>

      <!-- PAGINACIÓN -->
      <mat-paginator [length]="100" [pageSize]="10" [pageSizeOptions]="[5, 10, 25, 50]"></mat-paginator>

    </mat-card-content>
  </mat-card>

</div>
