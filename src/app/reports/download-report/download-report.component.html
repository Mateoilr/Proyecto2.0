<div class="download-container" [ngClass]="{'pdf-mode': !!blobUrl}">
  <mat-card class="download-card" [ngClass]="{'expanded-card': !!blobUrl}">
    <mat-card-header>
      <div mat-card-avatar class="header-icon">
        <mat-icon color="primary">science</mat-icon>
      </div>
      <mat-card-title>Laboratorio Clínico AG</mat-card-title>
      <mat-card-subtitle>Resultados de Laboratorio</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="content-body" [ngClass]="{'no-padding': !!blobUrl}">
      <ng-container *ngIf="!pdfUrl">
        <div class="error-state">
          <mat-icon color="warn">error_outline</mat-icon>
          <p>Enlace inválido o incompleto.</p>
          <p class="small-text">Por favor, verifique el link que recibió.</p>
        </div>
      </ng-container>

      <ng-container *ngIf="pdfUrl">
        <div *ngIf="isRedirecting && !blobUrl" class="loading-state">
          <mat-spinner diameter="48"></mat-spinner>
          <p>Obteniendo su documento...</p>
        </div>

        <div *ngIf="blobUrl" class="pdf-viewer-container">
          <object [data]="safeBlobUrl" type="application/pdf" width="100%" height="100%">
            <p>Su navegador no soporta la previsualización de PDFs. Puede descargarlo haciendo clic en el botón inferior.</p>
          </object>
        </div>
      </ng-container>
    </mat-card-content>

    <mat-card-actions *ngIf="blobUrl" class="actions-container">
      <button mat-raised-button color="primary" (click)="downloadPdf()">
        <mat-icon>download</mat-icon>
        Descargar PDF
      </button>
    </mat-card-actions>
  </mat-card>
</div>
